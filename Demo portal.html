<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal SJKTK Kuala Lipis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg0: #0a0e1a;
            --bg1: #1f0954;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #6366f1;
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, var(--bg1), var(--bg0)); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

        /* Header */
        header { text-align: center; padding: 40px 20px; }
        h1 { font-size: 2rem; font-weight: 900; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* Admin Panel & Form */
        #adminPanel { display: none; background: var(--glass); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; margin-top: 5px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Main Buttons */
        .main-nav { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
        .btn-nav { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 25px; border-radius: 50px; color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.3s; cursor: pointer;}
        .btn-nav:hover { background: var(--accent); }

        /* List View (Bento/List Style) */
        .list-container { display: grid; gap: 12px; }
        .item-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .item-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); }
        .item-info a { color: white; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        .item-info p { font-size: 0.8rem; color: var(--text-muted); }

        /* Actions */
        .actions { display: none; gap: 8px; }
        .btn-edit { color: #fbbf24; cursor: pointer; background: none; border: none; }
        .btn-delete { color: #f87171; cursor: pointer; background: none; border: none; }

        /* Footer Bar */
        .footer-bar { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.9); padding: 10px; text-align: center; border-top: 1px solid var(--glass-border); font-size: 0.8rem; }
        .admin-login-btn { color: var(--text-muted); cursor: pointer; text-decoration: underline; font-size: 0.7rem; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<header>
    <h1>PORTAL KURIKULUM DIGITAL</h1>
    <p>SJKT Kuala Lipis</p>
</header>

<div class="container">
    <!-- Admin Form -->
    <div id="adminPanel">
        <h3 style="margin-bottom: 15px;">Tambah / Edit Pautan</h3>
        <input type="hidden" id="editIndex">
        <div class="form-group">
            <label>Nama Dokumen/Aplikasi</label>
            <input type="text" id="itemName" placeholder="Contoh: RPH Minggu 1">
        </div>
        <div class="form-group">
            <label>Pautan URL (Google Drive/Laman Web)</label>
            <input type="text" id="itemUrl" placeholder="https://drive.google.com/...">
        </div>
        <button class="btn-save" onclick="saveItem()">Simpan Data</button>
        <button onclick="logoutAdmin()" style="background:none; border:none; color: #f87171; margin-top: 15px; cursor: pointer;">Keluar Admin</button>
    </div>

    <!-- Navigation -->
    <div class="main-nav">
        <div class="btn-nav"><i data-lucide="grid"></i> Aplikasi</div>
        <div class="btn-nav"><i data-lucide="file-text"></i> Dokumen</div>
    </div>

    <!-- List of Data -->
    <div id="itemList" class="list-container">
        <!-- Data akan dipaparkan di sini -->
    </div>

    <span class="admin-login-btn" onclick="loginAdmin()">Log Masuk Admin</span>
</div>

<div class="footer-bar">
    @Cikgu Nitya • SJKT Kuala Lipis
</div>

<script>
    lucide.createIcons();
    let isAdmin = false;
    let dataList = JSON.parse(localStorage.getItem('portalData')) || [];

    // Fungsi Log Masuk
    function loginAdmin() {
        const pass = prompt("Sila masukkan kata laluan admin:");
        if (pass === "gpk1") {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
            renderData();
            alert("Log masuk berjaya!");
        } else {
            alert("Kata laluan salah!");
        }
    }

    function logoutAdmin() {
        isAdmin = false;
        document.getElementById('adminPanel').style.display = 'none';
        renderData();
    }

    // Simpan Data (Tambah/Edit)
    function saveItem() {
        const name = document.getElementById('itemName').value;
        const url = document.getElementById('itemUrl').value;
        const editIndex = document.getElementById('editIndex').value;

        if (!name || !url) return alert("Sila isi semua ruangan");

        if (editIndex === "") {
            dataList.push({ name, url });
        } else {
            dataList[editIndex] = { name, url };
            document.getElementById('editIndex').value = "";
        }

        localStorage.setItem('portalData', JSON.stringify(dataList));
        document.getElementById('itemName').value = "";
        document.getElementById('itemUrl').value = "";
        renderData();
    }

    // Padam Data
    function deleteItem(index) {
        if (confirm("Padam item ini?")) {
            dataList.splice(index, 1);
            localStorage.setItem('portalData', JSON.stringify(dataList));
            renderData();
        }
    }

    // Edit Data (Isi semula borang)
    function editItem(index) {
        const item = dataList[index];
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemUrl').value = item.url;
        document.getElementById('editIndex').value = index;
        window.scrollTo(0,0);
    }

    // Paparkan Data ke Skrin
    function renderData() {
        const listDiv = document.getElementById('itemList');
        listDiv.innerHTML = "";

        dataList.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div class="item-info">
                    <a href="${item.url}" target="_blank">${item.name}</a>
                    <p>${item.url.substring(0, 40)}...</p>
                </div>
                <div class="actions" style="display: ${isAdmin ? 'flex' : 'none'}">
                    <button class="btn-edit" onclick="editItem(${index})"><i data-lucide="edit-3"></i></button>
                    <button class="btn-delete" onclick="deleteItem(${index})"><i data-lucide="trash-2"></i></button>
                </div>
            `;
            listDiv.appendChild(card);
        });
        lucide.createIcons();
    }

    // Jalankan render semasa mula
    renderData();
</script>

</body>
</html>
